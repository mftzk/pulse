services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulse}
      POSTGRES_DB: ${POSTGRES_DB:-pulse}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulse}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./server
    command: api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD:-pulse}@postgres:5432/${POSTGRES_DB:-pulse}?sslmode=disable
      SESSION_SECRET: ${SESSION_SECRET:-please-change-me}
      COOKIE_SECURE: "false"   # set "true" behind HTTPS
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # api runs migrations before it starts listening, so "healthy" == schema ready
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build: ./server
    command: worker
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD:-pulse}@postgres:5432/${POSTGRES_DB:-pulse}?sslmode=disable
      # WORKER_ID is intentionally unset: it defaults to the container hostname,
      # which is unique per replica. Scale with: docker compose up --scale worker=3
      CLAIM_BATCH: "10"
      LEASE_DURATION: "30s"
      POLL_INTERVAL: "2s"
    depends_on:
      api:
        condition: service_healthy

  web:
    build: ./web
    environment:
      API_URL: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
